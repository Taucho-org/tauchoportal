<!--
  TauchoPortal — Shared App Header Template
  Used via web component: <taucho-header></taucho-header>
  Rendered by: /js/web-components.js (TauchoHeader class)
  Required scripts (in order):
    <script src="/js/auth.js"></script>
    <script src="/js/translations.js"></script>
    <script src="/js/localization.js"></script>
    <script src="/js/web-components.js"></script>
  Usage: place <taucho-header></taucho-header> at top of <body>
-->

<!-- REFERENCE HTML (actual rendering is done by TauchoHeader.render() in web-components.js) -->
<header class="taucho-header">
    <div class="header-container">

        <!-- Logo -->
        <div class="logo-section">
            <a href="/" class="logo">🌊 TauchoPortal</a>
        </div>

        <!-- Main Navigation -->
        <nav class="header-nav">
            <ul>
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/streams">My Streams</a></li>
                <li><a href="/monitors">📡 Watched Channels</a></li>
                <li><a href="/devices">🔌 My Devices</a></li>
            </ul>
        </nav>

        <!-- Right-side Controls -->
        <div class="header-controls">
            <!-- Language Selector -->
            <select id="language-selector" class="language-selector" title="Language">
                <option value="en">🇬🇧 EN</option>
                <option value="ja">🇯🇵 JA</option>
                <option value="de">🇩🇪 DE</option>
                <option value="fr">🇫🇷 FR</option>
                <option value="es">🇪🇸 ES</option>
            </select>

            <!-- User Menu -->
            <div class="user-menu-wrap">
                <button class="user-menu-btn" id="userMenuBtn">
                    <span class="user-avatar">👤</span>
                    <span class="user-label"><!-- username injected by JS --></span>
                    <span class="caret">▾</span>
                </button>
                <div id="userMenu" class="user-menu" style="display:none">
                    <a href="/profile">👤 Profile</a>
                    <a href="/account-settings">⚙️ Account Settings</a>
                    <hr>
                    <!-- onclick calls logout() from auth.js; redirects to /login -->
                    <a href="#" id="logoutBtn" class="logout-item">🚪 Sign Out</a>
                </div>
            </div>
        </div>

    </div>
</header>

<!--
  To add a new nav link:
    1. Add <li><a href="/newpage">Label</a></li> here
    2. Add the same in TauchoHeader.render() inside web-components.js

  Logout flow:
    - logoutBtn click → calls logout() in auth.js
    - logout() POSTs to /api/auth/logout, clears cookie, redirects to /login

  Active link:
    - setupEventListeners() in web-components.js adds .active to the link
      whose href matches window.location.pathname prefix

  Username display:
    - connectedCallback() calls getUserProfile() (auth.js) async
    - Sets .user-label text to user.username or email prefix
-->
